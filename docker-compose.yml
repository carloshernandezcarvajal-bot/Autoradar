services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoradar
      POSTGRES_PASSWORD: autoradar
      POSTGRES_DB: autoradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoradar:autoradar@db:5432/autoradar
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: production
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
